function getAllSurvey() {
    return openDB().then(db => {
        return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_NAME, 'readonly');
            const store = tx.objectStore(STORE_NAME);
            const req = store.getAll();
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });
    });
}
function deleteSurvey(id) {
    return openDB().then(db => {
        return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            const req = store.delete(id);
            req.onsuccess = () => resolve();
            req.onerror = () => reject(req.error);
        });
    });
}

<!-- IndexedDB Utility untuk dataSurvey -->
<script>
const DB_NAME = 'mappingDB';
const DB_VERSION = 1;
const STORE_NAME = 'dataSurvey';

function openDB() {
    return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = function(e) {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
                db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
            }
        };
        req.onsuccess = function(e) { resolve(e.target.result); };
        req.onerror = function(e) { reject(e.target.error); };
    });
}

function addSurvey(data) {
    return openDB().then(db => {
        return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            const req = store.add(data);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });
    });
}
</script>

        <script>
// === UTILITAS ===
function dmsToDecimal(dms, ref) {
    var deg = dms[0].numerator / dms[0].denominator;
    var min = dms[1].numerator / dms[1].denominator;
    var sec = dms[2].numerator / dms[2].denominator;
    var dec = deg + min/60 + sec/3600;
    if (ref === 'S' || ref === 'W') dec = -dec;
    return dec;
}
function getGpsFromFile(file, callback) {
    var reader = new FileReader();
    reader.onload = function(e) {
        var arrayBuffer = e.target.result;
        try {
            var tags = EXIF.readFromBinaryFile(arrayBuffer);
            var lat = null, lng = null;
            if(tags.GPSLatitude && tags.GPSLongitude && tags.GPSLatitudeRef && tags.GPSLongitudeRef) {
                lat = dmsToDecimal(tags.GPSLatitude, tags.GPSLatitudeRef);
                lng = dmsToDecimal(tags.GPSLongitude, tags.GPSLongitudeRef);
            }
            callback({lat: lat, lng: lng});
        } catch (err) {
            callback({lat: null, lng: null});
        }
    };
    reader.readAsArrayBuffer(file);
}

// === DATA & VARIABEL GLOBAL ===
var markerGeotag = null;
var map, userLocation = null;

// === INISIALISASI PETA ===
function initMap() {
    // Otomatis periksa lokasi tanpa popup
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(pos) {
            userLocation = [pos.coords.latitude, pos.coords.longitude];
            buatMap(userLocation);
        }, function(err) {
            // Jika gagal, langsung gunakan lokasi default tanpa popup
            buatMap([-1.6875, 101.6175]);
        }, {timeout: 10000});
    } else {
        buatMap([-1.6875, 101.6175]);
    }
}
function buatMap(center) {
    map = L.map('map', {maxZoom: 17}).setView(center, 15);
    var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap contributors', maxZoom: 22 });
    var sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles © Esri', maxZoom: 17 });
    var terrain = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { attribution: '© OpenTopoMap', maxZoom: 22 });
    var baseLayers = { "OSM": osm, "Satelit": sat, "Terrain": terrain };
    osm.addTo(map);
    L.control.layers(baseLayers).addTo(map);
    if(center && center.length===2) {
        // Tampilkan marker (pin) dan label
        L.marker(center).addTo(map);
        var label = L.divIcon({
            className: 'marker-label-kecil',
            html: '<span class="label-tri-anim" style="font-size:11px;color:#dc3545;background:#fffbe7;padding:2px 6px;border-radius:4px;box-shadow:0 1px 2px #0001;display:inline-block;line-height:1.3;max-width:120px;white-space:normal;text-align:center;">Tri Febrianti<br>Berada di Lokasi Ini</span>',
            iconSize: [220, 18],
            iconAnchor: [110, 32]
        });
        L.marker(center, {icon: label, interactive: false}).addTo(map);
    }
    afterMapInit();
}
function afterMapInit() {
    window.drawnItems = new L.FeatureGroup();
    map.addLayer(window.drawnItems);
    var drawControl = new L.Control.Draw({
        draw: { polygon: true, marker: true, polyline: false, rectangle: false, circle: false, circlemarker: false },
        edit: { featureGroup: window.drawnItems }
    });

function handleFormSubmit(e) {
    if(e) e.preventDefault();
    const jenisKegiatan = document.getElementById('jenis-kegiatan').value.trim();
    const tanggalKegiatan = document.getElementById('tanggal-kegiatan').value.trim();
    const nama = document.getElementById('nama').value.trim();
    const gapoktan = document.getElementById('gapoktan').value.trim();
    const desa = document.getElementById('desa') ? document.getElementById('desa').value.trim() : '';
    const luas = document.getElementById('luas').value.trim();
    const deskripsi = document.getElementById('deskripsi').value.trim();
    const koordinat = document.getElementById('koordinat').value.trim();
    const fotoInput = document.getElementById('foto');

    // Validasi wajib
    if (!jenisKegiatan || !nama || !luas || !koordinat) {
        alert('Semua field wajib diisi dan koordinat harus dipilih dari peta!');
        return;
    }
    // Cek mode edit
    const editId = document.getElementById('form-lahan').getAttribute('data-edit-id');

    function parseXY(koor) {
        // Jika polygon, ambil titik pertama
        let k = koor.includes('|') ? koor.split('|')[0].trim() : koor.trim();
        let coords = k.split(',');
        let lat = coords[0] && coords[0].trim() !== '' ? coords[0].trim() : '';
        let lng = coords[1] && coords[1].trim() !== '' ? coords[1].trim() : '';
        return {x: lat, y: lng};
    }

    function finishSubmit(foto, lat, lng) {
        let x = '', y = '';
        if (lat !== undefined && lat !== null && lat !== '') {
            x = lat;
        }
        if (lng !== undefined && lng !== null && lng !== '') {
            y = lng;
        }
        if (!x || !y) {
            let xy = parseXY(koordinat);
            x = x || xy.x;
            y = y || xy.y;
        }
        // Validasi x/y
        if (!x || !y || isNaN(parseFloat(x)) || isNaN(parseFloat(y))) {
            alert('Koordinat tidak valid!');
            return;
        }
        // Simpan data ke IndexedDB
        const surveyData = {jenisKegiatan, tanggalKegiatan, nama, gapoktan, desa, luas, deskripsi, koordinat: String(x)+','+String(y), x: String(x), y: String(y), foto:foto||''};
        const editId = document.getElementById('form-lahan').getAttribute('data-edit-id');
        if (editId) {
            // Update data
            openDB().then(db => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                surveyData.id = Number(editId);
                const req = store.put(surveyData);
                req.onsuccess = () => {
                    setTimeout(renderTabelLokasi, 0);
                    var lastKoordinat = document.getElementById('koordinat').value;
                    document.getElementById('form-lahan').reset();
                    document.getElementById('koordinat').value = lastKoordinat;
                    document.getElementById('form-lahan').removeAttribute('data-edit-id');
                    alert('Data berhasil diupdate!');
                };
                req.onerror = () => {
                    alert('Gagal update data!');
                };
            });
        } else {
            // Tambah data baru
            addSurvey(surveyData)
                .then(function() {
                    setTimeout(renderTabelLokasi, 0);
                    var lastKoordinat = document.getElementById('koordinat').value;
                    document.getElementById('form-lahan').reset();
                    document.getElementById('koordinat').value = lastKoordinat;
                    alert('Data berhasil disimpan!');
                })
                .catch(function(err) {
                    console.error('Gagal menyimpan data:', err);
                    alert('Gagal menyimpan data! Pastikan browser mengizinkan penyimpanan lokal (IndexedDB) dan tidak dalam mode private/incognito.\nError: ' + err);
                });
        }
    }

    if(fotoInput.files && fotoInput.files[0]) {
        processFotoGeotag(fotoInput.files[0], function(res) {
            finishSubmit(res.foto, res.lat, res.lng);
        });
    } else {
        finishSubmit('', '', '');
    }
    return false;
}

function handleFotoChange(e) {
    var file = this.files && this.files[0];
    if(!file) return;
    processFotoGeotag(file, function(res) {
        if(res.lat && res.lng) {
            // Jika foto punya lokasi, tampilkan marker foto dan isi input koordinat
            document.getElementById('koordinat').value = res.lat + ',' + res.lng;
            if(res.foto) {
                tampilkanFotoDiPeta(parseFloat(res.lat), parseFloat(res.lng), res.foto);
            } else {
                renderSemuaMarkerPeta();
                map.setView([parseFloat(res.lat),parseFloat(res.lng)], 17);
            }
            document.getElementById('geotag-info').style.display = '';
        } else {
            // Jika tidak ada lokasi di foto, kosongkan input koordinat
            document.getElementById('koordinat').value = '';
            document.getElementById('geotag-info').style.display = 'none';
        }
    });
}

// Kompres gambar sebelum disimpan ke IndexedDB
function processFotoGeotag(file, callback) {
    var reader = new FileReader();
    reader.onload = function(e) {
        var img = new Image();
        img.onload = function() {
            // Resize gambar ke max width 600px (atau height 600px), kualitas 0.6
            var maxDim = 600;
            var w = img.width;
            var h = img.height;
            if (w > maxDim || h > maxDim) {
                if (w > h) {
                    h = Math.round(h * maxDim / w);
                    w = maxDim;
                } else {
                    w = Math.round(w * maxDim / h);
                    h = maxDim;
                }
            }
            var canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            var ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            // Kompres ke jpeg kualitas 0.6
            var base64 = canvas.toDataURL('image/jpeg', 0.6);
            getGpsFromFile(file, function(gps) {
                // Data gambar akan diteruskan ke IndexedDB melalui callback
                callback({foto: base64, lat: gps.lat, lng: gps.lng});
            });
        };
        img.onerror = function() {
            // Jika gagal, tetap pakai base64 asli
            getGpsFromFile(file, function(gps) {
                // Data gambar akan diteruskan ke IndexedDB melalui callback
                callback({foto: e.target.result, lat: gps.lat, lng: gps.lng});
            });
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

                const y = document.getElementById('edit-y').value;
                getAllSurvey().then(function(dataSurvey) {
                    var item = dataSurvey.find(d => d.id === id);
                    if (!item) return alert('Data tidak ditemukan!');
                    // Ambil foto baru jika ada
                    var foto = '';
                    var fotoEl = document.querySelector('.foto-tabel[data-id="'+id+'"]');
                    if(fotoEl) {
                        foto = fotoEl.getAttribute('data-new-foto') !== null ? fotoEl.getAttribute('data-new-foto') : item.foto;
                    } else {
                        foto = item.foto;
                    }
                    // Jika foto dihapus
                    if(foto === '') foto = '';
                    // Update data
                    openDB().then(db => {
                        const tx = db.transaction(STORE_NAME, 'readwrite');
                        const store = tx.objectStore(STORE_NAME);
                        const updated = Object.assign({}, item, {jenisKegiatan, tanggalKegiatan, nama, gapoktan, desa, luas, deskripsi, x, y, koordinat: x+','+y, foto});
                        const req = store.put(updated);
                        req.onsuccess = () => {
                            window.editRowId = null;
                            renderTabelLokasi();
                            alert('Data berhasil diupdate!');
                        };
                        req.onerror = () => {
                            alert('Gagal update data!');
                        };
                    });
                });
            };
        // Tambahkan event klik pada foto di tabel
        tbody.querySelectorAll('.foto-tabel').forEach(function(img) {
            // Fitur klik ke peta
            img.addEventListener('click', function() {
                var id = Number(this.getAttribute('data-id'));
                getAllSurvey().then(function(dataSurveyNow) {
                    var item = dataSurveyNow.find(d => d.id === id);
                    if (!item) {
                        alert('Data tidak ditemukan!');
                        console.log('editSurvey: Data tidak ditemukan untuk id', id);
                        return;
                    }
                    // Scroll otomatis ke peta
                    var mapDiv = document.getElementById('map');
                    if (mapDiv) {
                        mapDiv.scrollIntoView({behavior: 'smooth', block: 'center'});
                    }
                    // Fokus ke marker foto di peta dan pastikan popup tampak keseluruhan
                    var lat = parseFloat(item.x);
                    var lng = parseFloat(item.y);
                    if (!isNaN(lat) && !isNaN(lng)) {
                        // Perkirakan offset agar popup tidak terpotong (misal geser ke atas)
                        var offsetLat = lat + 0.0015; // geser sedikit ke atas (nilai bisa disesuaikan)
                        map.setView([offsetLat, lng], 17, { animate: true });
                        // Cari marker yang sesuai dan buka popup foto
                        var found = false;
                        window.drawnItems.eachLayer(function(layer) {
                            if (layer.getLatLng && layer.getLatLng().lat.toFixed(6) == lat.toFixed(6) && layer.getLatLng().lng.toFixed(6) == lng.toFixed(6)) {
                                if (item.foto) {
                                    layer.bindPopup('<div style="text-align:center"><img src="'+item.foto+'" id="popup-foto" style="width:180px;height:180px;border-radius:12px;object-fit:cover;box-shadow:0 2px 8px #0002;cursor:pointer;" onclick="window.showFotoModal(\''+item.foto+'\')"><br><span style="font-size:14px;color:#2a7a3a">'+lat.toFixed(6)+', '+lng.toFixed(6)+'</span><br><button onclick="window.showFotoModal(\''+item.foto+'\')" style="margin-top:8px;padding:4px 12px;font-size:13px;border-radius:6px;background:#2e7d32;color:#fff;border:none;cursor:pointer;">Perbesar Foto</button></div>').openPopup();
                                } else {
                                    layer.openPopup();
                                }
                                found = true;
                            }
                        });
                        if (!found && item.foto) {
                            var marker = L.marker([lat, lng]).addTo(window.drawnItems);
                            marker.bindPopup('<div style="text-align:center"><img src="'+item.foto+'" id="popup-foto" style="width:180px;height:180px;border-radius:12px;object-fit:cover;box-shadow:0 2px 8px #0002;cursor:pointer;" onclick="window.showFotoModal(\''+item.foto+'\')"><br><span style="font-size:14px;color:#2a7a3a">'+lat.toFixed(6)+', '+lng.toFixed(6)+'</span><br><button onclick="window.showFotoModal(\''+item.foto+'\')" style="margin-top:8px;padding:4px 12px;font-size:13px;border-radius:6px;background:#2e7d32;color:#fff;border:none;cursor:pointer;">Perbesar Foto</button></div>').openPopup();
                        }
                    }
                });
            });
        });
        // Fitur zoom icon
        tbody.querySelectorAll('.zoom-icon').forEach(function(icon) {
            icon.addEventListener('click', function(e) {
                e.stopPropagation();
                var id = Number(this.getAttribute('data-zoom-id'));
                getAllSurvey().then(function(dataSurveyNow) {
                    var item = dataSurveyNow.find(d => d.id === id);
                    if (item && item.foto) {
                        window.showFotoModal(item.foto);
                    }
                });
            });
        });
            renderSemuaMarkerPeta();
        });
    }

// Fungsi untuk menampilkan semua marker lokasi pada peta
function renderSemuaMarkerPeta() {
    if(!window.drawnItems) {
        console.warn('drawnItems belum diinisialisasi, skip render marker');
        return;
    }
    window.drawnItems.clearLayers();
    getAllSurvey().then(function(allData) {
        allData.forEach(function(item) {
            if(item.x && item.y) {
                var lat = parseFloat(item.x);
                var lng = parseFloat(item.y);
                if(!isNaN(lat) && !isNaN(lng)) {
                    var marker = L.marker([lat, lng]).addTo(window.drawnItems)
                        .bindPopup('<div style="font-size:13px;text-align:center;"><b>'+ (item.nama||'Lokasi') +'</b><br>'+lat.toFixed(6)+', '+lng.toFixed(6)+(item.foto?'<br><img src="'+item.foto+'" style="width:50px;height:50px;border-radius:6px;object-fit:cover;">'+
                        '<br><button onclick="window.showFotoModal(\''+item.foto+'\')" style="margin-top:8px;padding:4px 12px;font-size:13px;border-radius:6px;background:#2e7d32;color:#fff;border:none;cursor:pointer;">Perbesar Foto</button>':'')+'</div>');
                    // Tambahkan label kecil di bawah marker
                    var label = L.divIcon({
                        className: 'marker-label-kecil',
                        html: '<span style="font-size:11px;color:#2a7a3a;background:#fffbe7;padding:2px 6px;border-radius:4px;box-shadow:0 1px 2px #0001;display:inline-block;line-height:1.3;max-width:120px;white-space:normal;text-align:center;">'+((item.nama||'Lokasi').replace(/ /g,'<br>'))+'</span>',
                        iconSize: [100, 28],
                        iconAnchor: [50, 32]
                    });
                    L.marker([lat, lng], {icon: label, interactive: false}).addTo(window.drawnItems);
                }
            }
        });
    });
}
function hapusSurvey(idx) {
    if(confirm('Hapus data ini?')) {
        deleteSurvey(idx).then(function() {
            renderTabelLokasi();
        });
    }
}

// Ekspor KML
function eksporLokasiKML() {
    getAllSurvey().then(function(dataSurveyNow) {
        let kml = `<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n`;
        kml += `<kml xmlns=\"http://www.opengis.net/kml/2.2\">\n<Document>\n`;
        dataSurveyNow.forEach(function(item) {
            if(item.x && item.y) {
                kml += `<Placemark>\n`;
                kml += `<name>${item.nama||'Lokasi'}</name>\n`;
                kml += `<description>${item.jenisKegiatan||''} - ${item.deskripsi||''}</description>\n`;
                kml += `<Point><coordinates>${item.y},${item.x},0</coordinates></Point>\n`;
                kml += `</Placemark>\n`;
            }
        });
        kml += `</Document>\n</kml>`;
        var blob = new Blob([kml], {type: 'application/vnd.google-earth.kml+xml'});
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'data_lokasi.kml';
        a.click();
        URL.revokeObjectURL(url);
    });
}


// Ekspor Excel
function eksporLokasiExcel() {
    getAllSurvey().then(function(dataSurveyNow) {
        const ws_data = [
            ['Jenis Kegiatan', 'Nama', 'Gapoktan/Kelompok', 'Luas', 'Deskripsi', 'X', 'Y']
        ];
        dataSurveyNow.forEach(function(item) {
            ws_data.push([item.jenisKegiatan, item.nama, item.gapoktan||'', item.luas, item.deskripsi||'', item.x||'', item.y||'']);
        });
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(ws_data);
        XLSX.utils.book_append_sheet(wb, ws, 'DataLokasi');
        XLSX.writeFile(wb, 'data_lokasi.xlsx');
    });
}


// === CUSTOM CONTROL LOKASI SAYA ===
var userMarker;
var userMarker, userLabelMarker;
var LokasiControl = L.Control.extend({
    options: { position: 'topright' },
    onAdd: function(map) {
        var container = L.DomUtil.create('div', 'leaflet-bar');
        var btn = L.DomUtil.create('a', 'leaflet-control-lokasi', container);
        btn.id = 'btn-lokasi-sekarang';
        btn.href = '#';
        btn.title = 'Kembali ke Lokasi Saya';
        btn.setAttribute('role', 'button');
        btn.setAttribute('tabindex', '0');
        btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><line x1="12" y1="3" x2="12" y2="1" stroke="currentColor" stroke-width="2"/><line x1="12" y1="23" x2="12" y2="21" stroke="currentColor" stroke-width="2"/><line x1="21" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="2"/><line x1="1" y1="12" x2="3" y2="12" stroke="currentColor" stroke-width="2"/></svg>';
        L.DomEvent.on(btn, 'click', function(e) {
            L.DomEvent.stopPropagation(e);
            L.DomEvent.preventDefault(e);
            if (navigator.geolocation) {
                btn.classList.add('leaflet-control-lokasi-loading');
                navigator.geolocation.getCurrentPosition(function(pos) {
                    var lat = pos.coords.latitude;
                    var lng = pos.coords.longitude;
                    var userLatLng = [lat, lng];
                    map.setView(userLatLng, 16, { animate: true });
                    // Tampilkan marker (pin) dan label
                    if (userMarker) {
                        userMarker.setLatLng(userLatLng).update();
                    } else {
                        userMarker = L.marker(userLatLng).addTo(map);
                    }
                    if (userLabelMarker) {
                        userLabelMarker.setLatLng(userLatLng).update();
                    } else {
                        var label = L.divIcon({
                            className: 'marker-label-kecil',
                            html: '<span class="label-tri-anim" style="font-size:11px;color:#dc3545;background:#fffbe7;padding:2px 6px;border-radius:4px;box-shadow:0 1px 2px #0001;display:inline-block;line-height:1.3;max-width:120px;white-space:normal;text-align:center;">Tri Febrianti<br>Berada di Lokasi Ini</span>',
                            iconSize: [220, 18],
                            iconAnchor: [110, 32]
                        });
                        userLabelMarker = L.marker(userLatLng, {icon: label, interactive: false}).addTo(map);
                    }
                    btn.classList.remove('leaflet-control-lokasi-loading');
                }, function() {
                    alert('Gagal mendapatkan lokasi.');
                    btn.classList.remove('leaflet-control-lokasi-loading');
                });
            }
        });
        return container;
    }
});
        // Modal foto besar
        window.showFotoModal = function(src) {
            var modal = document.createElement('div');
            modal.id = 'foto-modal';
            modal.style.position = 'fixed';
            modal.style.top = '0';
            modal.style.left = '0';
            modal.style.width = '100vw';
            modal.style.height = '100vh';
            modal.style.background = 'rgba(0,0,0,0.7)';
            modal.style.display = 'flex';
            modal.style.alignItems = 'center';
            modal.style.justifyContent = 'center';
            modal.style.zIndex = '9999';
            modal.innerHTML = '<div style="position:relative;text-align:center;"><img src="'+src+'" style="max-width:90vw;max-height:80vh;border-radius:16px;box-shadow:0 4px 24px #0006;" alt="Foto Lokasi"><br><button id="close-foto-modal" style="margin-top:16px;padding:8px 24px;font-size:16px;border-radius:8px;background:#dc3545;color:#fff;border:none;cursor:pointer;">Tutup</button></div>';
            document.body.appendChild(modal);
            document.getElementById('close-foto-modal').onclick = function() {
                document.body.removeChild(modal);
            };
            modal.onclick = function(e) {
                if(e.target === modal) document.body.removeChild(modal);
            };
        };
        </script>
